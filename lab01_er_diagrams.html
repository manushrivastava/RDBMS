<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 1: ER Diagrams — CSE2132 RDBMS Lab</title>
<style>
/* ===========================================================
   CSE2132 RDBMS Lab — shared slide-deck stylesheet
   Theme-aware (light/dark), self-contained, no external deps.
   =========================================================== */

:root{
  --accent: #2563eb;
  --accent-2: #7c3aed;
  --good: #15803d;
  --good-bg: #dcfce7;
  --bad: #b91c1c;
  --bad-bg: #fee2e2;
  --match-bg: #fef9c3;
  --match-fg: #854d0e;

  --bg: #f4f6fb;
  --panel: #ffffff;
  --panel-2: #eef1f8;
  --text: #1c2333;
  --text-dim: #5b6478;
  --border: #dbe1ee;
  --code-bg: #0f172a;
  --code-fg: #e2e8f0;
  --shadow: 0 10px 30px rgba(20,30,60,.08);
}

:root[data-theme="dark"]{
  --bg: #0e1220;
  --panel: #161c2e;
  --panel-2: #1e2540;
  --text: #e8ecf8;
  --text-dim: #9aa4c0;
  --border: #2a3252;
  --code-bg: #0a0e1a;
  --code-fg: #dfe6f5;
  --shadow: 0 10px 30px rgba(0,0,0,.45);
  --good-bg: #113523;
  --good: #4ade80;
  --bad-bg: #3b1414;
  --bad: #f87171;
  --match-bg: #3a3212;
  --match-fg: #fde68a;
}

@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg: #0e1220;
    --panel: #161c2e;
    --panel-2: #1e2540;
    --text: #e8ecf8;
    --text-dim: #9aa4c0;
    --border: #2a3252;
    --code-bg: #0a0e1a;
    --code-fg: #dfe6f5;
    --shadow: 0 10px 30px rgba(0,0,0,.45);
    --good-bg: #113523;
    --good: #4ade80;
    --bad-bg: #3b1414;
    --bad: #f87171;
    --match-bg: #3a3212;
    --match-fg: #fde68a;
  }
}

*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;height:100%;
  background:var(--bg);
  color:var(--text);
  font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  overflow-x:hidden;
}

#app{
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ---------- Top bar ---------- */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 22px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  gap:12px;
  flex-wrap:wrap;
}
.topbar .brand{
  display:flex;
  flex-direction:column;
  line-height:1.15;
}
.topbar .brand b{font-size:.98rem;}
.topbar .brand span{font-size:.75rem;color:var(--text-dim);}
.topbar a.home-link{
  color:var(--accent);
  text-decoration:none;
  font-size:.8rem;
  border:1px solid var(--border);
  padding:5px 10px;
  border-radius:8px;
}
.topbar a.home-link:hover{background:var(--panel-2);}

.progress-wrap{
  flex:1;
  min-width:120px;
  height:6px;
  background:var(--panel-2);
  border-radius:99px;
  overflow:hidden;
  margin:0 10px;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  width:0%;
  transition:width .25s ease;
}
.slide-counter{font-size:.8rem;color:var(--text-dim);white-space:nowrap;}

/* ---------- Stage ---------- */
.stage{
  flex:1;
  display:flex;
  align-items:stretch;
  justify-content:center;
  padding:26px 20px 10px;
}
.slide{
  width:100%;
  max-width:980px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:34px 42px;
  animation:fadeIn .35s ease;
  display:none;
  flex-direction:column;
  gap:14px;
}
.slide.active{display:flex;}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.eyebrow{
  text-transform:uppercase;
  letter-spacing:.09em;
  font-size:.72rem;
  font-weight:700;
  color:var(--accent);
}
h1.slide-title{font-size:1.65rem;margin:2px 0 4px;}
h2.slide-title{font-size:1.4rem;margin:2px 0 4px;}
.subheading{color:var(--text-dim);font-size:1rem;margin-top:-6px;}

/* Title slide */
.slide.title-slide{justify-content:center;align-items:flex-start;}
.slide.title-slide .lab-badge{
  display:inline-block;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  color:#fff;
  padding:6px 14px;
  border-radius:99px;
  font-weight:700;
  font-size:.8rem;
  margin-bottom:6px;
}
.slide.title-slide ul{margin-top:10px;}

ul.bullets{margin:6px 0 0 0;padding-left:22px;}
ul.bullets li{margin:6px 0;line-height:1.5;}
ul.bullets li::marker{color:var(--accent);}

.theory-body p{line-height:1.6;margin:8px 0;}
.theory-body table{border-collapse:collapse;width:100%;margin:10px 0;}
.theory-body table th, .theory-body table td{
  border:1px solid var(--border);
  padding:7px 10px;
  font-size:.92rem;
  text-align:left;
}
.theory-body table th{background:var(--panel-2);}
.theory-body code, .syntax-code code{font-family: Consolas, "Courier New", monospace;}
.callout{
  border-left:4px solid var(--accent);
  background:var(--panel-2);
  padding:10px 14px;
  border-radius:8px;
  font-size:.92rem;
}
.callout.warn{border-left-color:var(--bad);}
.callout.tip{border-left-color:var(--good);}

/* Syntax block */
.syntax-code{
  background:var(--code-bg);
  color:var(--code-fg);
  padding:16px 18px;
  border-radius:12px;
  font-family:Consolas,"Courier New",monospace;
  font-size:.95rem;
  white-space:pre-wrap;
  line-height:1.5;
  overflow-x:auto;
}
.syntax-notes{margin-top:6px;}
.syntax-notes li{margin:5px 0;}

/* ---------- Animation component ---------- */
.anim-query{
  background:var(--code-bg);
  color:var(--code-fg);
  font-family:Consolas,"Courier New",monospace;
  padding:12px 16px;
  border-radius:10px;
  font-size:.95rem;
  overflow-x:auto;
  white-space:pre-wrap;
}
.anim-query mark{
  background:var(--match-bg);
  color:var(--match-fg);
  border-radius:4px;
  padding:0 3px;
}
.anim-caption{
  background:var(--panel-2);
  border-radius:10px;
  padding:10px 14px;
  font-size:.95rem;
  min-height:1.3em;
}
.anim-panels{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}
.anim-panel{flex:1;min-width:220px;}
.anim-panel h4{
  margin:0 0 6px;
  font-size:.85rem;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:.04em;
}
.anim-table{
  width:100%;
  border-collapse:collapse;
  font-size:.88rem;
  overflow:hidden;
  border-radius:8px;
}
.anim-table th, .anim-table td{
  border:1px solid var(--border);
  padding:6px 9px;
  text-align:left;
  transition:background .3s ease, color .3s ease, transform .2s ease;
}
.anim-table th{background:var(--panel-2);}
.anim-table tr.row-good td{background:var(--good-bg);color:var(--good);font-weight:600;}
.anim-table tr.row-bad td{background:var(--bad-bg);color:var(--bad);text-decoration:line-through;}
.anim-table tr.row-match td{background:var(--match-bg);color:var(--match-fg);font-weight:600;}
.anim-table tr.row-neutral td{opacity:.55;}
.anim-table tr.row-new td{animation:popIn .4s ease;}
@keyframes popIn{
  from{transform:scale(.9);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.anim-controls{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.anim-step-indicator{font-size:.8rem;color:var(--text-dim);}

/* ---------- Buttons ---------- */
button.btn{
  border:1px solid var(--border);
  background:var(--panel-2);
  color:var(--text);
  padding:8px 16px;
  border-radius:9px;
  cursor:pointer;
  font-size:.88rem;
  font-weight:600;
  transition:background .15s ease, transform .1s ease;
}
button.btn:hover{background:var(--border);}
button.btn:active{transform:scale(.97);}
button.btn.primary{
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  color:#fff;
  border:none;
}
button.btn.primary:hover{filter:brightness(1.08);}
button.btn:disabled{opacity:.4;cursor:not-allowed;}
button.btn.small{padding:5px 11px;font-size:.78rem;}

/* ---------- Quiz ---------- */
.quiz-list{display:flex;flex-direction:column;gap:14px;}
.quiz-item{
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
}
.quiz-q{font-weight:600;margin-bottom:8px;}
.quiz-options{list-style:none;padding:0;margin:0 0 8px;display:flex;flex-direction:column;gap:5px;}
.quiz-options li{
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:7px;
  font-size:.88rem;
  background:var(--panel);
}
.quiz-answer{
  display:none;
  margin-top:8px;
  padding:10px 12px;
  background:var(--good-bg);
  color:var(--good);
  border-radius:8px;
  font-size:.9rem;
  line-height:1.5;
}
.quiz-answer.show{display:block;animation:fadeIn .3s ease;}
.quiz-answer b{color:inherit;}

/* Summary slide */
.summary-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}
.summary-card{
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  font-size:.9rem;
  line-height:1.5;
}
.summary-card b{color:var(--accent);}

/* ---------- Diagram component (ER diagrams / schema diagrams) ---------- */
.diagram-wrap{display:flex;flex-direction:column;gap:10px;}
.diagram-canvas{
  position:relative;
  display:grid;
  gap:34px 20px;
  padding:26px 16px;
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:14px;
  overflow-x:auto;
}
.diagram-svg-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
.diagram-svg-layer line{stroke:var(--text-dim);stroke-width:1.6;}
.diagram-svg-layer rect.edge-chip{fill:var(--panel);stroke:var(--border);stroke-width:1;}
.diagram-svg-layer text{fill:var(--text-dim);font-size:11px;font-family:inherit;}
.diagram-node{position:relative;justify-self:center;align-self:center;z-index:2;text-align:center;}
.diagram-node .shape{transition:outline .25s ease, opacity .25s ease, filter .25s ease;}
.diagram-node.state-active .shape{outline:3px solid var(--accent);outline-offset:3px;filter:drop-shadow(0 0 6px rgba(37,99,235,.35));}
.diagram-node.state-done .shape{opacity:.5;}
.diagram-node.state-bad .shape{outline:3px solid var(--bad);outline-offset:3px;}

.shape-entity, .shape-plain{
  border:2px solid var(--text);
  background:var(--panel);
  padding:9px 16px;
  border-radius:5px;
  font-weight:700;
  font-size:.85rem;
  white-space:nowrap;
}
.shape-plain{font-weight:600;border-color:var(--border);}
.shape-weak-entity{padding:4px;border:2px solid var(--text);border-radius:6px;background:var(--panel);}
.shape-weak-entity .inner{border:2px solid var(--text);padding:7px 13px;border-radius:3px;font-weight:700;font-size:.85rem;white-space:nowrap;}

/* Diamond shapes: the pre-rotation box MUST be square, and its rotated
   (√2× larger) bounding box must stay within the container's own height,
   or the diamond visually bleeds into neighbouring grid rows. */
.shape-relationship{position:relative;width:134px;height:94px;display:flex;align-items:center;justify-content:center;}
.shape-relationship .diamond-bg{position:absolute;top:50%;left:50%;width:58px;height:58px;margin:-29px 0 0 -29px;background:var(--panel);border:2px solid var(--text);transform:rotate(45deg);}
.shape-weak-relationship{position:relative;width:142px;height:100px;display:flex;align-items:center;justify-content:center;}
.shape-weak-relationship .diamond-bg{position:absolute;top:50%;left:50%;width:46px;height:46px;margin:-23px 0 0 -23px;background:var(--panel);border:2px solid var(--text);transform:rotate(45deg);}
.shape-weak-relationship .diamond-bg2{position:absolute;top:50%;left:50%;width:62px;height:62px;margin:-31px 0 0 -31px;background:transparent;border:2px solid var(--text);transform:rotate(45deg);}
.shape-label{position:relative;z-index:1;font-size:.74rem;font-weight:700;text-align:center;padding:0 4px;line-height:1.2;max-width:64px;overflow-wrap:break-word;}

.shape-attribute, .shape-key-attr, .shape-multi-attr, .shape-derived-attr{
  border:2px solid var(--text);
  border-radius:999px;
  padding:8px 16px;
  background:var(--panel);
  font-size:.8rem;
  white-space:nowrap;
}
.shape-key-attr{text-decoration:underline;text-decoration-thickness:1.5px;font-weight:700;}
.shape-derived-attr{border-style:dashed;}
.shape-multi-attr{padding:3px;border-style:solid;}
.shape-multi-attr .inner{border:2px solid var(--text);border-radius:999px;padding:6px 14px;white-space:nowrap;}

.shape-table{
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--panel);
  overflow:hidden;
  min-width:170px;
  text-align:left;
  box-shadow:0 4px 14px rgba(20,30,60,.06);
}
.shape-table .tbl-head{
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  color:#fff;
  font-weight:700;
  font-size:.82rem;
  padding:7px 12px;
}
.shape-table .tbl-row{
  padding:4px 12px;
  font-size:.78rem;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  gap:8px;
  white-space:nowrap;
}
.shape-table .tbl-tag{
  font-size:.65rem;
  font-weight:700;
  color:var(--accent);
  background:var(--panel-2);
  padding:1px 6px;
  border-radius:99px;
}
.diagram-split{
  display:flex;
  gap:20px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.diagram-canvas-col{flex:1.15;min-width:300px;}
.diagram-canvas-col .diagram-canvas{margin:0;}
.diagram-side-panels{
  flex:1;
  min-width:260px;
  max-height:560px;
  overflow-y:auto;
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
}
.diagram-side-heading{
  font-size:.76rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--text-dim);
  margin-bottom:10px;
}
.diagram-side-inner.anim-panels{
  flex-direction:column;
  gap:12px;
}
.diagram-side-inner .anim-panel{min-width:0;}
@media (max-width:760px){
  .diagram-split{flex-direction:column;}
  .diagram-side-panels{max-height:360px;}
}

.diagram-legend{
  display:flex;
  flex-wrap:wrap;
  gap:10px 18px;
  font-size:.76rem;
  color:var(--text-dim);
  padding:0 4px;
}
.diagram-legend span{display:inline-flex;align-items:center;gap:6px;}
.diagram-legend .swatch{width:14px;height:14px;border:2px solid var(--text);flex:none;}
.diagram-legend .swatch.dia{transform:rotate(45deg);width:10px;height:10px;}
.diagram-legend .swatch.ell{border-radius:999px;width:18px;height:11px;}

/* ---------- Bottom nav ---------- */
.bottombar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:14px 20px 24px;
}
.dots{display:flex;gap:6px;flex-wrap:wrap;max-width:520px;justify-content:center;}
.dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--border);
  cursor:pointer;
  border:none;
  padding:0;
}
.dot.active{background:var(--accent);width:22px;border-radius:5px;}

kbd{
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:5px;
  padding:1px 6px;
  font-family:inherit;
  font-size:.8rem;
}

@media (max-width:640px){
  .slide{padding:22px 18px;}
  h1.slide-title{font-size:1.3rem;}
  .anim-panels{flex-direction:column;}
}

<body>
<div id="app"></div>
<script>
const DECK = {
  labNumber: 1,
  title: "Lab 1: ER Diagrams → Relational Model",
  subtitle: "ERDplus/Dia, Logical→Relational Mapping, Entities/Attributes, Primary & Foreign Keys",
  slides: [
    {
      type: 'title',
      badge: 'Lab 1 · CSE2132.1 (Apply)',
      heading: 'Entity-Relationship Diagrams',
      subheading: 'Designing a database on paper before writing a single line of SQL',
      bullets: [
        'Draw ER diagrams using a tool such as ERDplus or Dia',
        'Read and interpret every symbol used in standard ER notation',
        'Identify entities, attributes (simple, composite, multivalued, derived, key) and relationships in a real-world scenario',
        'Convert a Logical (ER) Model into a Relational (table) Model using a repeatable rulebook',
        'Fully map a real, textbook-style ER diagram end-to-end — every entity, attribute and relationship',
        'Correctly place primary keys and foreign keys, including for weak entities and 1:1/1:N/M:N relationships'
      ]
    },
    {
      type: 'theory',
      eyebrow: 'Why model first?',
      heading: 'Why Do We Need an ER Diagram At All?',
      html: `
        <p>It is tempting to skip planning entirely and jump straight into <code>CREATE TABLE</code> statements the moment a project starts. To see why that is a mistake, watch what happens when a college database is built this way — as one big, "obvious" table, with no modelling step first.</p>
        <p><b>The naive approach:</b> a single table holding everything about who is enrolled in what.</p>
        <table>
          <tr><th>roll_no</th><th>student_name</th><th>student_email</th><th>course_code</th><th>course_title</th><th>instructor</th><th>marks</th></tr>
          <tr><td>101</td><td>Aditi</td><td>aditi@mu.ac.in</td><td>CSE201</td><td>DBMS</td><td>Dr. Rao</td><td>88</td></tr>
          <tr><td>101</td><td>Aditi</td><td>aditi@mu.ac.in</td><td>CSE202</td><td>OS</td><td>Dr. Nair</td><td>91</td></tr>
          <tr><td>101</td><td>Aditi</td><td>aditi@mu.ac.in</td><td>CSE203</td><td>Networks</td><td>Dr. Rao</td><td>79</td></tr>
        </table>
        <p>This single table quietly creates four separate real problems, all at once:</p>
        <ul class="bullets">
          <li><b>Redundancy.</b> Aditi's name and email are copied once for every course she takes. Three courses today; ten courses over four years means the same two facts stored ten times.</li>
          <li><b>Update anomaly.</b> If Aditi's email changes, every one of those repeated rows must be updated. Miss even one, and the database now claims Aditi has two different email addresses depending on which row you happen to read — with no way to tell which one is current.</li>
          <li><b>Insert anomaly.</b> A brand-new course (say, "Cloud Computing") cannot be entered into this table at all until at least one student has enrolled in it — because a course only exists here as a side-effect of an enrollment row. You cannot record "this course exists" as a standalone fact.</li>
          <li><b>Delete anomaly.</b> If Aditi is the only student who ever took "Networks" and her row is deleted (she graduates, or the row is removed by mistake), the entire course — its title, its instructor — silently vanishes from the database with her, even though the course itself still exists in the real world.</li>
        </ul>
        <div class="callout warn">None of these four problems is a SQL syntax mistake — they are <em>design</em> mistakes. No amount of clever querying can fix them after the fact; the table structure itself is wrong. This is exactly the class of problem ER modelling exists to prevent, before a single CREATE TABLE is ever written.</div>
        <p><b>What an ER diagram forces you to do differently:</b> before touching SQL, it makes you explicitly ask "what are the separate real-world <em>things</em> here?" — and answer STUDENT, COURSE, and ENROLLMENT, each as its own entity with its own facts. That single question, asked on paper, is what naturally leads to three separate tables instead of one tangled one, and the four problems above simply cannot occur — a student's email is stored exactly once, a course can exist with zero students, and deleting an enrollment never deletes a course.</p>
        <p><b>A second, equally important reason:</b> an ER diagram is a communication tool, not just a technical one. A registrar or a professor cannot read SQL, but they <em>can</em> look at boxes-and-diamonds on paper and say "wait, a student can have more than one advisor, your diagram only allows one" — catching a wrong business rule in a five-minute conversation. The same misunderstanding, undiscovered until after the tables are built and the application is live, can take days of data migration to fix. Modelling on paper is cheap; redesigning a live production database is not.</p>
        <div class="callout tip">This lab teaches you to both read an ER diagram and mechanically translate it into correctly-designed tables, using one continuous real-world example so every rule is seen applied in context, not just in isolation.</div>
      `
    },
    {
      type: 'diagram',
      eyebrow: 'Notation cheat-sheet',
      heading: 'Every Symbol You Will See, in One Place',
      description: 'Before reading a real diagram, make sure each shape below is instantly recognisable — this legend covers everything used throughout the course.',
      cols: 6, rows: 2, legend: true,
      nodes: [
        { id:'n1', shape:'entity', col:1, row:1, label:'ENTITY' },
        { id:'n2', shape:'weak-entity', col:2, row:1, label:'WEAK ENTITY' },
        { id:'n3', shape:'relationship', col:3, row:1, label:'relationship' },
        { id:'n4', shape:'weak-relationship', col:4, row:1, label:'identifying' },
        { id:'n5', shape:'attribute', col:1, row:2, label:'attribute' },
        { id:'n6', shape:'key-attr', col:2, row:2, label:'key attribute' },
        { id:'n7', shape:'multi-attr', col:3, row:2, label:'multivalued' },
        { id:'n8', shape:'derived-attr', col:4, row:2, label:'derived' },

<script>
/* ===========================================================
   CSE2132 RDBMS Lab — shared slide-deck engine
   Consumes a global `DECK` object (defined per-lab HTML file)

   DECK SCHEMA
   ---------------------------------------------------------
   const DECK = {
     labNumber: 3,
     title: "Lab 3: DDL",
     subtitle: "Creating Tables, Data Types, Modifying a Table",
     slides: [ ...slide objects... ]

      { type:'title', badge:'Lab 3 · CO2', heading, subheading,
        bullets:[ 'Objective 1', 'Objective 2', ... ] }

   2) section

      -- `html` is a raw HTML string (paragraphs/lists/tables allowed).

   4) syntax

   5) animation  -- step-through visual query execution
      { type:'animation', eyebrow, heading, query, description,
        steps: [
          {
            caption: 'Explanation of this step',
            query: 'ALTER TABLE ... ',           // optional: OVERRIDE the slide-level query for this step
                                                   // (use when the statement itself changes step to step,
                                                   // e.g. CREATE -> ALTER -> DROP, or INSERT -> COMMIT -> ROLLBACK)
            queryHighlight: 'WHERE dept = 10',   // optional substring to <mark> in query
            panels: [
              {
                title: 'STUDENTS (source)',
                columns: ['id','name','dept'],
                rows: [
                  { cells:[1,'Ann',10], cls:'row-match' },   // '' | row-good | row-bad | row-match | row-neutral | row-new
                  { cells:[2,'Bob',20], cls:'row-neutral' }
                ]
              },
              { title:'RESULT', columns:[...], rows:[...] }
            ]
          },
          ... more steps (each step is a FULL snapshot, author precomputes state) ...
        ]
      }

   6) quiz  -- practice questions revealed on click
      { type:'quiz', eyebrow, heading, questions:[
          { q:'...', options:['a','b','c'] (optional), answer:'...(shown text)', explanation:'...' (optional) }
        ]
      }

   7) summary
      { type:'summary', eyebrow, heading, cards:[ {title,text}, ... ] }

   8) diagram  -- ER diagram / schema diagram renderer (boxes, diamonds, ellipses,
      table cards) laid out on a CSS grid, with SVG lines connecting them.
      { type:'diagram', eyebrow, heading, description,
        cols: 7, rows: 4,     // grid size in whole-number cells
        legend: true,          // optional: shows a standard ER-notation legend strip
        nodes: [
          { id:'company', shape:'entity', col:1, row:2, label:'COMPANY' },
          { id:'staff_id', shape:'key-attr', col:3, row:1, label:'ID' },
          { id:'work', shape:'relationship', col:2, row:2, label:'Work' },
          { id:'child', shape:'weak-entity', col:6, row:3, label:'CHILD' },
          { id:'phone', shape:'multi-attr', col:4, row:1, label:'Phone' },
          { id:'age', shape:'derived-attr', col:5, row:1, label:'Age' },
          { id:'tbl_company', shape:'table', col:1, row:2, label:'COMPANY',

        // shape options: entity | weak-entity | relationship | weak-relationship |
        //                attribute | key-attr | multi-attr | derived-attr | table | plain

(function(){
  const app = document.getElementById('app');
  if(!app || typeof DECK === 'undefined'){
    console.error('DECK not found or #app missing.');
    return;
  }

  let current = 0;
  const slides = DECK.slides || [];

  // ---------- Chrome ----------
  const topbar = el('div', 'topbar');
  const brand = el('div', 'brand');
  brand.innerHTML = `<b>${escapeHtml(DECK.title || 'RDBMS Lab')}</b><span>${escapeHtml(DECK.subtitle || '')}</span>`;
  const progressWrap = el('div', 'progress-wrap');
  const progressBar = el('div', 'progress-bar');
  progressWrap.appendChild(progressBar);
  const counter = el('div', 'slide-counter');
  const homeLink = document.createElement('a');
  homeLink.className = 'home-link';
  homeLink.href = './index.html';
  homeLink.textContent = '← All labs';
  topbar.append(brand, progressWrap, counter, homeLink);

  const stage = el('div', 'stage');
  const slideHost = el('div', 'slide');
  stage.appendChild(slideHost);

  const bottombar = el('div', 'bottombar');
  const prevBtn = button('‹ Prev', 'btn');
  const dots = el('div', 'dots');
  const nextBtn = button('Next ›', 'btn primary');
  bottombar.append(prevBtn, dots, nextBtn);

  app.append(topbar, stage, bottombar);

  slides.forEach((_, i) => {
    const d = button('', 'dot');
    d.setAttribute('aria-label', 'Go to slide ' + (i + 1));
    d.addEventListener('click', () => goTo(i));
    dots.appendChild(d);
  });

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));
  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight' || e.key === ' ') { goTo(current + 1); }
    else if(e.key === 'ArrowLeft'){ goTo(current - 1); }
    else if(e.key === 'Home'){ goTo(0); }
    else if(e.key === 'End'){ goTo(slides.length - 1); }
  });

  function goTo(i){
    if(i < 0 || i >= slides.length) return;
    current = i;
    render();
  }

  function render(){
    slideHost.innerHTML = '';
    slideHost.className = 'slide active';
    const s = slides[current];
    if(!s){ return; }
    buildSlide(s, slideHost);

    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === slides.length - 1;
    counter.textContent = `Slide ${current + 1} / ${slides.length}`;
    progressBar.style.width = ((current + 1) / slides.length * 100) + '%';
    [...dots.children].forEach((d, i) => d.classList.toggle('active', i === current));
    window.scrollTo(0,0);
  }

  // ---------- Slide builders ----------
  function buildSlide(s, host){
    switch(s.type){
      case 'title': return buildTitle(s, host);
      case 'section': return buildSection(s, host);
      case 'theory': return buildTheory(s, host);
      case 'syntax': return buildSyntax(s, host);
      case 'animation': return buildAnimation(s, host);
      case 'quiz': return buildQuiz(s, host);
      case 'summary': return buildSummary(s, host);
      case 'diagram': return buildDiagram(s, host);
      default:
        host.innerHTML = `<p>Unknown slide type: ${escapeHtml(s.type)}</p>`;
    }
  }

  function buildTitle(s, host){
    host.classList.add('title-slide');
    if(s.badge){
      const b = el('span', 'lab-badge');
      b.textContent = s.badge;
      host.appendChild(b);
    }
    const h = el('h1', 'slide-title');
    h.textContent = s.heading || '';
    host.appendChild(h);
    if(s.subheading){
      const sub = el('div', 'subheading');
      sub.textContent = s.subheading;
      host.appendChild(sub);
    }
    if(s.bullets && s.bullets.length){
      const ul = el('ul', 'bullets');
      s.bullets.forEach(b => {
        const li = document.createElement('li');
        li.textContent = b;
        ul.appendChild(li);
      });
      host.appendChild(ul);
    }
  }

  function buildSection(s, host){
    if(s.eyebrow) host.appendChild(eyebrowEl(s.eyebrow));
    const h = el('h2', 'slide-title');
    h.textContent = s.heading || '';
    host.appendChild(h);
    if(s.text){
      const p = document.createElement('p');
      p.style.fontSize = '1.05rem';
      p.style.color = 'var(--text-dim)';
      p.style.lineHeight = '1.6';
      p.textContent = s.text;
      host.appendChild(p);
    }
  }

  function buildTheory(s, host){
    if(s.eyebrow) host.appendChild(eyebrowEl(s.eyebrow));
    const h = el('h2', 'slide-title');
    h.textContent = s.heading || '';
    host.appendChild(h);
    const body = el('div', 'theory-body');
    body.innerHTML = s.html || '';
    host.appendChild(body);
  }

  function buildSyntax(s, host){
    if(s.eyebrow) host.appendChild(eyebrowEl(s.eyebrow));
    const h = el('h2', 'slide-title');
    h.textContent = s.heading || '';
    host.appendChild(h);
    const code = el('div', 'syntax-code');
    code.textContent = s.code || '';
    host.appendChild(code);
    if(s.notes && s.notes.length){
      const ul = el('ul', 'bullets syntax-notes');
      s.notes.forEach(n => {
        const li = document.createElement('li');
        li.innerHTML = n;
        ul.appendChild(li);
      });
      host.appendChild(ul);
    }
  }

  function buildAnimation(s, host){
    if(s.eyebrow) host.appendChild(eyebrowEl(s.eyebrow));
    const h = el('h2', 'slide-title');
    h.textContent = s.heading || '';
    host.appendChild(h);
    if(s.description){
      const p = document.createElement('p');
      p.style.color = 'var(--text-dim)';
      p.style.margin = '0';
      p.textContent = s.description;
      host.appendChild(p);
    }

    const queryEl = el('div', 'anim-query');
    host.appendChild(queryEl);

    const caption = el('div', 'anim-caption');
    host.appendChild(caption);

    const panelsWrap = el('div', 'anim-panels');
    host.appendChild(panelsWrap);

    const controls = el('div', 'anim-controls');
    const stepPrev = button('‹ Step back', 'btn small');
    const stepPlay = button('▶ Auto-play', 'btn small');
    const stepNext = button('Step forward ›', 'btn small primary');
    const stepReset = button('↻ Reset', 'btn small');
    const indicator = el('span', 'anim-step-indicator');
    controls.append(stepPrev, stepNext, stepPlay, stepReset, indicator);
    host.appendChild(controls);

    let step = 0;
    let timer = null;
    const steps = s.steps || [];

    function renderStep(){
      const st = steps[step];
      if(!st) return;

      // query with optional highlighted substring (a step may override the base query entirely)
      const q = (st.query !== undefined ? st.query : s.query) || '';
      if(st.queryHighlight && q.includes(st.queryHighlight)){
        const parts = q.split(st.queryHighlight);
        queryEl.innerHTML = parts.map(escapeHtml).join(`<mark>${escapeHtml(st.queryHighlight)}</mark>`);
      } else {
        queryEl.textContent = q;
      }

      caption.textContent = st.caption || '';
      renderTablePanels(panelsWrap, st.panels || []);

      indicator.textContent = `Step ${step + 1} / ${steps.length}`;
      stepPrev.disabled = step === 0;
      stepNext.disabled = step === steps.length - 1;
    }

    stepPrev.addEventListener('click', () => { step = Math.max(0, step - 1); renderStep(); });
    stepNext.addEventListener('click', () => { step = Math.min(steps.length - 1, step + 1); renderStep(); });
    stepReset.addEventListener('click', () => { step = 0; stopPlay(); renderStep(); });

    function stopPlay(){
      if(timer){ clearInterval(timer); timer = null; stepPlay.textContent = '▶ Auto-play'; }
    }
    stepPlay.addEventListener('click', () => {
      if(timer){ stopPlay(); return; }
      stepPlay.textContent = '⏸ Pause';
      timer = setInterval(() => {
        if(step >= steps.length - 1){ stopPlay(); return; }
        step++;
        renderStep();
      }, 1600);
    });

    renderStep();
  }

  function buildQuiz(s, host){
    if(s.eyebrow) host.appendChild(eyebrowEl(s.eyebrow));
    const h = el('h2', 'slide-title');
    h.textContent = s.heading || '';
    host.appendChild(h);

    const list = el('div', 'quiz-list');
    (s.questions || []).forEach((q, idx) => {
      const item = el('div', 'quiz-item');
      const qEl = el('div', 'quiz-q');
      qEl.textContent = `Q${idx + 1}. ${q.q}`;
      item.appendChild(qEl);

      if(q.options && q.options.length){
        const ul = el('ul', 'quiz-options');
        q.options.forEach(o => {
          const li = document.createElement('li');
          li.textContent = o;
          ul.appendChild(li);
        });
        item.appendChild(ul);
      }

      const showBtn = button('Show Answer', 'btn small');
      const ansEl = el('div', 'quiz-answer');
      ansEl.innerHTML = `<b>Answer:</b> ${q.answer}` + (q.explanation ? `<br><br>${q.explanation}` : '');
      showBtn.addEventListener('click', () => {
        const shown = ansEl.classList.toggle('show');
        showBtn.textContent = shown ? 'Hide Answer' : 'Show Answer';
      });
      item.append(showBtn, ansEl);
      list.appendChild(item);
    });
    host.appendChild(list);
  }

  function buildSummary(s, host){
    if(s.eyebrow) host.appendChild(eyebrowEl(s.eyebrow));
    const h = el('h2', 'slide-title');
    h.textContent = s.heading || '';
    host.appendChild(h);
    const grid = el('div', 'summary-grid');
    (s.cards || []).forEach(c => {
      const card = el('div', 'summary-card');
      card.innerHTML = `<b>${escapeHtml(c.title || '')}</b><br>${c.text || ''}`;
      grid.appendChild(card);
    });
    host.appendChild(grid);
  }

  function buildDiagram(s, host){
    const wrap = el('div', 'diagram-wrap');
    if(s.eyebrow) wrap.appendChild(eyebrowEl(s.eyebrow));
    const h = el('h2', 'slide-title');
    h.textContent = s.heading || '';
    wrap.appendChild(h);
    if(s.description){
      const p = document.createElement('p');
      p.style.color = 'var(--text-dim)';
      p.style.margin = '0';
      p.textContent = s.description;
      wrap.appendChild(p);
    }

    let caption = null, controls = null, indicator = null, stepPrev = null, stepNext = null;
    const steps = s.steps || [];
    if(steps.length){
      caption = el('div', 'anim-caption');
      wrap.appendChild(caption);
    }

    const canvas = el('div', 'diagram-canvas');
    canvas.style.gridTemplateColumns = `repeat(${s.cols || 4}, minmax(90px,1fr))`;
    canvas.style.gridTemplateRows = `repeat(${s.rows || 3}, auto)`;

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'diagram-svg-layer');
    canvas.appendChild(svg);

    const nodeEls = {};
    (s.nodes || []).forEach(n => {
      const nodeDiv = el('div', 'diagram-node');
      nodeDiv.style.gridColumn = String(n.col || 1);
      nodeDiv.style.gridRow = String(n.row || 1);
      nodeDiv.appendChild(buildShape(n));
      canvas.appendChild(nodeDiv);
      nodeEls[n.id] = nodeDiv;
    });

    // If any step carries a `tables` array, render the diagram and the evolving
    // relational schema side by side (schema panels update in lockstep with the steps).
    const hasTablePanels = (s.steps || []).some(st => st.tables && st.tables.length);
    let sidePanels = null;
    if(hasTablePanels){
      const split = el('div', 'diagram-split');
      const canvasCol = el('div', 'diagram-canvas-col');
      canvasCol.appendChild(canvas);
      sidePanels = el('div', 'diagram-side-panels');
      const sideHeading = el('div', 'diagram-side-heading');
      sideHeading.textContent = 'Relational schema — building up live';
      const sideInner = el('div', 'anim-panels diagram-side-inner');
      split.append(canvasCol, sidePanels);
      sidePanels.append(sideHeading, sideInner);
      sidePanels = sideInner;
      wrap.appendChild(split);
    } else {
      wrap.appendChild(canvas);
    }

    if(s.legend){
      const legend = el('div', 'diagram-legend');
      legend.innerHTML = `
        <span><i class="swatch"></i>Entity</span>
        <span><i class="swatch dia"></i>Relationship</span>
        <span><i class="swatch ell"></i>Attribute</span>
        <span><u>Attribute</u> = key</span>
        <span>Double outline = weak / multivalued</span>
        <span>Dashed = derived</span>
      `;
      wrap.appendChild(legend);
    }

    if(steps.length){
      controls = el('div', 'anim-controls');
      stepPrev = button('‹ Step back', 'btn small');
      const stepPlay = button('▶ Auto-play', 'btn small');
      stepNext = button('Step forward ›', 'btn small primary');
      const stepReset = button('↻ Reset', 'btn small');
      indicator = el('span', 'anim-step-indicator');
      controls.append(stepPrev, stepNext, stepPlay, stepReset, indicator);
      wrap.appendChild(controls);

      let step = 0;
      let timer = null;

      function renderStep(){
        const st = steps[step];
        if(!st) return;
        caption.textContent = st.caption || '';
        Object.keys(nodeEls).forEach(id => {
          nodeEls[id].classList.remove('state-active', 'state-done', 'state-bad');
        });
        (st.active || []).forEach(id => { if(nodeEls[id]) nodeEls[id].classList.add('state-active'); });
        (st.done || []).forEach(id => { if(nodeEls[id]) nodeEls[id].classList.add('state-done'); });
        (st.bad || []).forEach(id => { if(nodeEls[id]) nodeEls[id].classList.add('state-bad'); });
        if(sidePanels) renderTablePanels(sidePanels, st.tables || []);
        indicator.textContent = `Step ${step + 1} / ${steps.length}`;
        stepPrev.disabled = step === 0;
        stepNext.disabled = step === steps.length - 1;
      }
      function stopPlay(){
        if(timer){ clearInterval(timer); timer = null; stepPlay.textContent = '▶ Auto-play'; }
      }
      stepPrev.addEventListener('click', () => { step = Math.max(0, step - 1); renderStep(); });
      stepNext.addEventListener('click', () => { step = Math.min(steps.length - 1, step + 1); renderStep(); });
      stepReset.addEventListener('click', () => { step = 0; stopPlay(); renderStep(); });
      stepPlay.addEventListener('click', () => {
        if(timer){ stopPlay(); return; }
        stepPlay.textContent = '⏸ Pause';
        timer = setInterval(() => {
          if(step >= steps.length - 1){ stopPlay(); return; }
          step++;
          renderStep();
        }, 1800);
      });
      renderStep();
    }

    host.appendChild(wrap);

    // Draw edges once the canvas has been laid out in the live DOM.
    requestAnimationFrame(() => drawEdges(s.edges || [], canvas, svg, nodeEls));
  }

  function buildShape(n){
    const label = n.label || '';
    switch(n.shape){
      case 'entity': {
        const d = el('div', 'shape shape-entity');
        d.textContent = label;
        return d;
      }
      case 'weak-entity': {
        const outer = el('div', 'shape shape-weak-entity');
        const inner = el('div', 'inner');
        inner.textContent = label;
        outer.appendChild(inner);
        return outer;
      }
      case 'relationship': {
        const d = el('div', 'shape shape-relationship');
        const bg = el('div', 'diamond-bg');
        const lbl = el('span', 'shape-label');
        lbl.textContent = label;
        d.append(bg, lbl);
        return d;
      }
      case 'weak-relationship': {
        const d = el('div', 'shape shape-weak-relationship');
        const bg2 = el('div', 'diamond-bg2');
        const bg = el('div', 'diamond-bg');
        const lbl = el('span', 'shape-label');
        lbl.textContent = label;
        d.append(bg2, bg, lbl);
        return d;
      }
      case 'key-attr': {
        const d = el('div', 'shape shape-key-attr');
        d.textContent = label;
        return d;
      }
      case 'derived-attr': {
        const d = el('div', 'shape shape-derived-attr');
        d.textContent = label;
        return d;
      }
      case 'multi-attr': {
        const outer = el('div', 'shape shape-multi-attr');
        const inner = el('div', 'inner');
        inner.textContent = label;
        outer.appendChild(inner);
        return outer;
      }
      case 'table': {
        const d = el('div', 'shape shape-table');
        const headEl = el('div', 'tbl-head');
        headEl.textContent = label;
        d.appendChild(headEl);
        (n.columns || []).forEach(c => {
          const row = el('div', 'tbl-row');
          const nameSpan = document.createElement('span');
          nameSpan.textContent = c.name;
          row.appendChild(nameSpan);
          if(c.tag){
            const tag = el('span', 'tbl-tag');
            tag.textContent = c.tag;
            row.appendChild(tag);
          }
          d.appendChild(row);
        });
        return d;
      }
      case 'plain': {
        const d = el('div', 'shape shape-plain');
        d.textContent = label;
        return d;
      }
      case 'attribute':
      default: {
        const d = el('div', 'shape shape-attribute');
        d.textContent = label;
        return d;
      }
    }
  }

  function drawEdges(edges, canvas, svg, nodeEls){
    if(!edges.length) return;
    const canvasRect = canvas.getBoundingClientRect();
    svg.setAttribute('width', canvasRect.width);
    svg.setAttribute('height', canvasRect.height);
    svg.setAttribute('viewBox', `0 0 ${canvasRect.width} ${canvasRect.height}`);
    svg.innerHTML = '';
    const svgNS = 'http://www.w3.org/2000/svg';

    edges.forEach(e => {
      const fromEl = nodeEls[e.from], toEl = nodeEls[e.to];
      if(!fromEl || !toEl) return;
      const r1 = fromEl.getBoundingClientRect();
      const r2 = toEl.getBoundingClientRect();
      const x1 = r1.left + r1.width / 2 - canvasRect.left;
      const y1 = r1.top + r1.height / 2 - canvasRect.top;
      const x2 = r2.left + r2.width / 2 - canvasRect.left;
      const y2 = r2.top + r2.height / 2 - canvasRect.top;

      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      svg.appendChild(line);

      if(e.label){
        const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
        const chipW = 8 + e.label.length * 7;
        const rect = document.createElementNS(svgNS, 'rect');
        rect.setAttribute('class', 'edge-chip');
        rect.setAttribute('x', mx - chipW / 2);
        rect.setAttribute('y', my - 9);
        rect.setAttribute('width', chipW);
        rect.setAttribute('height', 16);
        rect.setAttribute('rx', 4);
        svg.appendChild(rect);

        const text = document.createElementNS(svgNS, 'text');
        text.setAttribute('x', mx);
        text.setAttribute('y', my + 3);
        text.setAttribute('text-anchor', 'middle');
        text.textContent = e.label;
        svg.appendChild(text);
      }
    });
  }

  // ---------- helpers ----------
  function renderTablePanels(container, panels){
    container.innerHTML = '';
    (panels || []).forEach(p => {
      const panel = el('div', 'anim-panel');
      const title = document.createElement('h4');
      title.textContent = p.title || '';
      panel.appendChild(title);
      const table = el('table', 'anim-table');
      const thead = document.createElement('thead');
      const trh = document.createElement('tr');
      (p.columns || []).forEach(c => {
        const th = document.createElement('th');
        th.textContent = c;
        trh.appendChild(th);
      });
      thead.appendChild(trh);
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      (p.rows || []).forEach(r => {
        const tr = document.createElement('tr');
        if(r.cls) tr.className = r.cls;
        (r.cells || []).forEach(cell => {
          const td = document.createElement('td');
          td.textContent = cell === null || cell === undefined ? 'NULL' : cell;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      panel.appendChild(table);
      container.appendChild(panel);
    });
  }
  function el(tag, cls){
    const e = document.createElement(tag);
    if(cls) e.className = cls;
    return e;
  }
  function button(text, cls){
    const b = document.createElement('button');
    b.className = cls;
    b.textContent = text;
    b.type = 'button';
    return b;
  }
  function eyebrowEl(text){
    const e = el('div', 'eyebrow');
    e.textContent = text;
    return e;
  }
  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  render();
})();

</script>
