{ type:'theory', eyebrow:'Course Recap', title:'From a Working Definition to a Working Vocabulary', railLabel:'Lecture Recap', html:`
<p class="lede">This lecture built the vocabulary the rest of the course assumes. A short recap of the arc it followed:</p>
<ul class="bullets">
<li><b>Database and DBMS</b> were defined precisely, and set against the wide range of everyday applications already built on top of one.</li>
<li><b>File-processing systems</b> were shown breaking down in three specific, reproducible ways &mdash; data redundancy causing silent inconsistency, missing atomicity letting a failure leave data half-updated, and uncoordinated concurrent access causing one user's update to be silently lost.</li>
<li><b>Database architecture</b> traced a single query through the storage manager and query processor, and distinguished the four kinds of people &mdash; naive users, application programmers, sophisticated users, and DBAs &mdash; who interact with a database system in different ways.</li>
<li><b>Schema and instance</b> separated a database's fixed design from the data living inside it at any one moment.</li>
<li><b>Data independence</b> showed why that separation matters in practice: a change at the physical level should never force every application built on the logical level to be rewritten.</li>
<li><b>Data models</b> named the four broad families &mdash; relational, entity-relationship, semi-structured, and object-based &mdash; that any database is built on top of, with the relational model set up as the foundation for everything that follows.</li>
<li><b>Database languages</b> split into DDL, which defines a schema, and DML, which queries and updates data &mdash; procedurally or declaratively &mdash; with forms-based, graphical, natural-language, and application interfaces standing between most users and those languages entirely.</li>
<li><b>The entity-relationship model</b> gave a vocabulary for design itself: entities and entity sets, attribute types from simple to derived, and relationship sets with a degree, roles, and sometimes descriptive attributes of their own.</li>
<li><b>Relationship constraints</b> pinned down exactly how entities associate &mdash; mapping cardinalities from one-to-one through many-to-many, total versus partial participation, keys for relationship sets, and weak entity sets that borrow their identity from a stronger owner.</li>
<li><b>Generalization, specialization, and aggregation</b> extended the basic model for entities that come in distinguishable subtypes &mdash; with attribute inheritance, disjoint versus overlapping and total versus partial constraints &mdash; and for relationships that themselves need to participate in further relationships.</li>
<li><b>Mapping rules</b> reduced a completed E-R diagram mechanically into relation schemas &mdash; one rule each for strong entity sets, multivalued attributes, weak entity sets, and relationship sets &mdash; with a cleanup pass to drop redundant schemas and combine others.</li>
</ul>
<div class="callout good"><div class="tag">What comes next</div><p>With this vocabulary and design method in place, the course moves on to the relational model and SQL in full detail, and eventually to the theory of functional dependencies and normalization that governs good relational design.</p></div>
` }
];

/* ================= RENDER HELPERS ================= */
function esc(s){ return String(s).replace(/&(?!#?\w+;)/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function fdRow(lhs, rhs, opts){
  opts = opts || {};
  var l = lhs.map(function(a){return '<span class="fd-attr">'+esc(a)+'</span>';}).join('');
  var r = rhs.map(function(a){return '<span class="fd-attr">'+esc(a)+'</span>';}).join('');
  return '<div class="fd-row"><span class="fd-set">'+l+'</span><span class="fd-arrow">'+(opts.arrow||'&rarr;')+'</span><span class="fd-set">'+r+'</span>'+(opts.note?'<span style="font-family:var(--font-body);color:var(--ink-faint);font-size:12.5px;margin-left:6px;">'+esc(opts.note)+'</span>':'')+'</div>';
}
function relCard(name, attrs, keyAttrs, notes){
  keyAttrs = keyAttrs || [];
  var attrHtml = attrs.map(function(a){
    return '<span'+(keyAttrs.indexOf(a)>-1?' class="key"':'')+'>'+esc(a)+'</span>';
  }).join('');
  var noteHtml = (notes||[]).map(function(f){ return '<div>'+f+'</div>'; }).join('');
  return '<div class="rel-card"><div class="rel-head">'+esc(name)+'</div><div class="rel-attrs">'+attrHtml+'</div>'+(noteHtml?'<div class="rel-fds">'+noteHtml+'</div>':'')+'</div>';
}

function renderPanel(p){
  if(p.pills){
    var tone = p.tone ? ' tone-'+p.tone : '';
    var pillsHtml = p.pills.map(function(pl){
      var cls='pill'+(pl.active?' active':'')+(pl.newest?' newest':'')+(pl.bad?' bad-pill':'');
      return '<span class="'+cls+'">'+esc(pl.text)+'</span>';
    }).join('');
    return '<div class="panel'+tone+'"><div class="panel-title">'+esc(p.title)+'</div><div class="pill-set">'+pillsHtml+'</div></div>';
  }
  if(p.note !== undefined){
    var tone2 = p.tone ? ' tone-'+p.tone : '';
    return '<div class="panel'+tone2+'"><div class="panel-title">'+esc(p.title)+'</div><div class="note-body">'+p.note+'</div></div>';
  }
  // table panel
  var cols = p.columns.map(function(c){ return '<th>'+esc(c)+'</th>'; }).join('');
  var rows = p.rows.map(function(r){
    var cells = r.cells.map(function(c,i){
      var ccls = (r.ccls && r.ccls[i]) ? ' class="'+r.ccls[i]+'"' : '';
      return '<td'+ccls+'>'+c+'</td>';
    }).join('');
    return '<tr class="'+(r.cls?('row-'+r.cls):'')+'">'+cells+'</tr>';
  }).join('');
  return '<div class="panel"><div class="panel-title">'+esc(p.title)+'</div><table class="ptable"><thead><tr>'+cols+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderGiven(g){
  if(!g) return '';
  var items='';
  (g.items||[]).forEach(function(it){
    items += '<div class="gi"><b>'+esc(it.label)+'</b><span class="val">'+it.value+'</span></div>';
  });
  var q = g.question ? '<div class="question">'+esc(g.question)+'</div>' : '';
  return '<div class="given-box">'+items+q+'</div>';
}

/* ================= SLIDE TYPE RENDERERS ================= */
function renderTitle(s){
  var meta=(s.meta||[]).map(function(m){return '<div><strong>'+esc(m.k)+'</strong>'+esc(m.v)+'</div>';}).join('');
  return '<div class="title-slide"><div class="title-rule"></div><p class="eyebrow">'+esc(s.kicker)+'</p>'+
    '<h1>'+s.title+'</h1><p class="lede">'+s.subtitle+'</p><div class="title-meta">'+meta+'</div></div>';
}
function renderSection(s, num){
  var topics=(s.topics||[]).map(function(t){return '<span>'+esc(t)+'</span>';}).join('');
  return '<div class="section-slide"><div class="num">'+String(num).padStart(2,'0')+'</div>'+
    '<div class="label">Part '+num+'</div><h1>'+s.title+'</h1>'+
    '<p class="blurb">'+s.blurb+'</p><div class="topics">'+topics+'</div></div>';
}
function renderTheory(s){
  return '<p class="eyebrow">'+esc(s.eyebrow)+'</p><h1 class="slide-title">'+s.title+'</h1>'+s.html;
}

var animState = {}; // slideIdx -> current step

function renderAnimation(s, slideIdx){
  if(animState[slideIdx]===undefined) animState[slideIdx]=0;
  var html = '<p class="eyebrow">'+esc(s.eyebrow)+'</p><h1 class="slide-title">'+s.title+'</h1>';
  if(s.intro) html += '<p class="lede" style="margin-bottom:16px;">'+s.intro+'</p>';
  html += renderGiven(s.given);
  html += '<div id="anim-body-'+slideIdx+'"></div>';
  return html;
}
function renderAnimBody(s, slideIdx){
  var step = animState[slideIdx]||0;
  var total = s.steps.length;
  var st = s.steps[step];
  var dots = s.steps.map(function(_,i){
    return '<button class="'+(i===step?'active':'')+'" data-goto="'+i+'" aria-label="Step '+(i+1)+'"></button>';
  }).join('');
  var panels = (st.panels||[]).map(renderPanel).join('');
  var html = '';
  html += '<div class="step-controls">';
  html += '<button class="navbtn" id="step-prev" '+(step===0?'disabled':'')+'>&larr; Step</button>';
  html += '<span class="step-counter">Step '+(step+1)+' / '+total+'</span>';
  html += '<button class="navbtn" id="step-next" '+(step===total-1?'disabled':'')+'>Step &rarr;</button>';
  html += '<span class="step-dots" style="margin:0 0 0 6px;">'+dots+'</span>';
  html += '</div>';
  html += '<div class="caption-strip"><div class="step-badge">'+(step+1)+'</div><div class="txt">'+st.caption+'</div></div>';
  html += '<div class="panels-wrap">'+panels+'</div>';
  if(st.answer){
    html += '<div class="final-answer show'+(st.badAnswer?' bad-answer':'')+'"><div class="tag">'+(st.badAnswer?'Outcome':'Result')+'</div>'+st.answer+'</div>';
  }
  return html;
}

/* ================= DECK ENGINE ================= */
var stageEl, slideEl, railListEl, phaseLabelEl, slideCountEl, progressFillEl;
var current = 0;
var PHASES = [];

function buildPhases(){
  PHASES = [];
  SLIDES.forEach(function(s, i){
    if(s.type==='section'){
      PHASES.push({ start:i, end:SLIDES.length-1, label:'Part '+(PHASES.length+1)+' · '+stripHtml(s.title) });
    }
  });
  for(var p=0;p<PHASES.length-1;p++){ PHASES[p].end = PHASES[p+1].start - 1; }
  if(PHASES.length===0){ PHASES.push({start:0,end:SLIDES.length-1,label:''}); }
  else if(PHASES[0].start>0){ PHASES.unshift({start:0,end:PHASES[0].start-1,label:'Intro'}); }
}
function phaseOf(i){
  for(var p=0;p<PHASES.length;p++){
    if(i>=PHASES[p].start && i<=PHASES[p].end) return p;
  }
  return 0;
}

function buildRail(){
  var html='';
  PHASES.forEach(function(ph, pi){
    html += '<div class="rail-phase">'+esc(ph.label)+'</div>';
    for(var i=ph.start;i<=ph.end;i++){
      var s = SLIDES[i];
      var title = s.railLabel || s.title || s.label || ('Slide '+(i+1));
      html += '<button class="rail-item" data-idx="'+i+'"><span class="rail-dot"></span>'+esc(stripHtml(title))+'</button>';
    }
  });
  railListEl.innerHTML = html;
  railListEl.querySelectorAll('.rail-item').forEach(function(btn){
    btn.addEventListener('click', function(){ goTo(parseInt(btn.dataset.idx,10)); });
  });
}
function stripHtml(s){ return String(s).replace(/<[^>]*>/g,''); }

function render(){
  var s = SLIDES[current];
  var html='';
  if(s.type==='title') html = renderTitle(s);
  else if(s.type==='section') html = renderSection(s, PHASES.length ? (phaseOf(current)+ (PHASES[0].label==='Intro'?0:1)) : 1);
  else if(s.type==='theory') html = renderTheory(s);
  else if(s.type==='animation') html = renderAnimation(s, current);
  slideEl.innerHTML = html;
  if(s.type==='animation'){
    document.getElementById('anim-body-'+current).innerHTML = renderAnimBody(s, current);
    wireAnim(s, current);
  }
  stageEl.scrollTop = 0;

  // topbar
  var ph = PHASES[phaseOf(current)];
  phaseLabelEl.textContent = ph ? ph.label : '';
  slideCountEl.textContent = (current+1)+' / '+SLIDES.length;
  progressFillEl.style.width = (((current+1)/SLIDES.length)*100)+'%';

  // rail state
  railListEl.querySelectorAll('.rail-item').forEach(function(btn){
    var idx = parseInt(btn.dataset.idx,10);
    btn.classList.toggle('active', idx===current);
    btn.classList.toggle('done', idx<current);
  });
  var activeBtn = railListEl.querySelector('.rail-item.active');
  if(activeBtn) activeBtn.scrollIntoView({block:'nearest'});

  document.getElementById('btn-prev').disabled = current===0;
  document.getElementById('btn-next').disabled = current===SLIDES.length-1;
  document.getElementById('btn-next').textContent = current===SLIDES.length-1 ? 'End' : 'Next →';
}

function wireAnim(s, slideIdx){
  var body = document.getElementById('anim-body-'+slideIdx);
  function setStep(i){
    animState[slideIdx] = Math.max(0, Math.min(s.steps.length-1, i));
    body.innerHTML = renderAnimBody(s, slideIdx);
    wireAnim(s, slideIdx);
  }
  var pv = document.getElementById('step-prev');
  var nx = document.getElementById('step-next');
  if(pv) pv.addEventListener('click', function(){ setStep((animState[slideIdx]||0)-1); });
  if(nx) nx.addEventListener('click', function(){ setStep((animState[slideIdx]||0)+1); });
  body.querySelectorAll('[data-goto]').forEach(function(btn){
    btn.addEventListener('click', function(){ setStep(parseInt(btn.dataset.goto,10)); });
  });
}

function goTo(i){
  if(i<0||i>=SLIDES.length) return;
  current=i; render();
}
function next(){
  var s = SLIDES[current];
  if(s.type==='animation'){
    var step = animState[current]||0;
    if(step < s.steps.length-1){
      animState[current]=step+1;
      document.getElementById('anim-body-'+current).innerHTML = renderAnimBody(s, current);
      wireAnim(s, current);
      return;
    }
  }
  goTo(current+1);
}
function prev(){ goTo(current-1); }

function initTheme(){
  var btn = document.getElementById('theme-btn');
  btn.addEventListener('click', function(){
    var root = document.documentElement;
    var cur = root.getAttribute('data-theme');
    var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var effectiveDark = cur ? cur==='dark' : sysDark;
    root.setAttribute('data-theme', effectiveDark ? 'light' : 'dark');
  });
}

function init(){
  stageEl = document.getElementById('stage');
  slideEl = document.getElementById('slide');
  railListEl = document.getElementById('rail-list');
  phaseLabelEl = document.getElementById('phase-label');
  slideCountEl = document.getElementById('slide-count');
  progressFillEl = document.getElementById('progress-fill');

  buildPhases();
  buildRail();
  render();
  initTheme();

  document.getElementById('btn-prev').addEventListener('click', prev);
  document.getElementById('btn-next').addEventListener('click', next);
  document.addEventListener('keydown', function(e){
    if(e.key==='ArrowRight' || e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); prev(); }
    else if(e.key==='Home'){ goTo(0); }
    else if(e.key==='End'){ goTo(SLIDES.length-1); }
  });
}
init();
</script>
